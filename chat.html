<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        #chatbox { width: 300px; height: 520px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 20px; position: fixed; bottom: 30px; right: 40px; display: none; z-index: 1001; overflow: hidden; border: 2px solid #0078d7; }
        .message { margin: 10px 0; }
        .bot { color: #333; }
        .user { color: #0078d7; text-align: right; }
        #options { margin-top: 10px; }
        .option-btn { margin: 5px 5px 0 0; padding: 8px 16px; border: none; border-radius: 4px; background: #0078d7; color: #fff; cursor: pointer; }
        .option-btn:hover { background: #005fa3; }
        #user-input { width: 60%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        #send-btn { padding: 8px 16px; border: none; border-radius: 4px; background: #0078d7; color: #fff; cursor: pointer; }
        #chatbot-icon { position: fixed; bottom: 20px; right: 40px; width: 56px; height: 56px; background: #0078d7; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px #ccc; z-index: 1002; }
        #chatbot-icon:hover { background: #005fa3; }
        #close-chat { position: absolute; top: 10px; right: 10px; background: transparent; border: none; font-size: 20px; color: #888; cursor: pointer; }
        #close-chat:hover { color: #d00; }
        #messages { height: 350px; max-height: 350px; overflow-y: auto; overflow-x: auto; direction: ltr; background: #fafbfc; padding-right: 8px; }
        #messages::-webkit-scrollbar { width: 10px; background: #f4f4f4; }
        #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 5px; }
        #messages { scrollbar-width: thin; scrollbar-color: #ccc #f4f4f4; }
    </style>
</head>
<body>
    <div id="chatbot-icon" title="Open Chatbot">
        <img src="/static/logo.png" alt="Chatbot Logo" style="width:32px;height:32px;display:block;margin:auto;" />
    </div>
    <div id="chatbox">
        <button id="close-chat" title="Close">&times;</button>
        <div id="messages"></div>
        <div id="options"></div>
        <div style="margin-top:10px;">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script>
        async function sendMessage(message) {
            const response = await fetch('/chat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            return response.json();
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + sender;
            if (sender === 'bot') {
                // Create a container for logo and text
                const container = document.createElement('div');
                container.style.display = 'flex';
                container.style.alignItems = 'flex-start';
                // Logo
                const logo = document.createElement('img');
                logo.src = '/static/logo.png';
                logo.alt = 'Bot Logo';
                logo.style.width = '24px';
                logo.style.height = '24px';
                logo.style.marginRight = '8px';
                // Text
                const textSpan = document.createElement('span');
                textSpan.textContent = text;
                container.appendChild(logo);
                container.appendChild(textSpan);
                msgDiv.appendChild(container);
            } else {
                msgDiv.textContent = text;
            }
            document.getElementById('messages').appendChild(msgDiv);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function showOptions(options) {
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            if (options && options.length) {
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => {
                        addMessage(opt, 'user');
                        document.getElementById('options').innerHTML = '';
                        handleUserInput(opt);
                    };
                    optionsDiv.appendChild(btn);
                });
            }
        }

        async function handleUserInput(input) {
            document.getElementById('user-input').value = '';
            const data = await sendMessage(input);
            if (data.bot) addMessage(data.bot, 'bot');
            showOptions(data.options);
        }

        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('user-input').value;
            if (input.trim()) {
                addMessage(input, 'user');
                handleUserInput(input);
            }
        };
        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });

        // Initial welcome message
        window.onload = () => {
            // Don't show chatbox on load
        };
        // Show chatbox when icon is clicked
        document.getElementById('chatbot-icon').onclick = () => {
            document.getElementById('chatbox').style.display = 'block';
            document.getElementById('chatbot-icon').style.display = 'none';
            handleUserInput('');
        };
        // Hide chatbox when close button is clicked
        document.getElementById('close-chat').onclick = () => {
            document.getElementById('chatbox').style.display = 'none';
            document.getElementById('chatbot-icon').style.display = 'flex';
        };
    </script>
</body>
</html>
